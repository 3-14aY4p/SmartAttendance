<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <div class="view">
      <div class="cap">Class List</div>

      <div class="wrap">
        <div class="frame">
          <div class="nav">
            <a class="nav-a" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i><span>Dashboard</span>
            </a>
            <a class="nav-a" href="/scanner" data-screen-link>
              <i class="bi bi-camera"></i><span>Scanner</span>
            </a>
            <a class="nav-a" href="/attendance-log" data-screen-link>
              <i class="bi bi-journal-check"></i><span>Attendance Log</span>
            </a>
            <a class="nav-a active" href="/class-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i><span>Class List</span>
            </a>
          </div>

          <div class="body">
            <div class="page cl">
              <div class="cl-in">
                <div class="cl-tools">
                  <div class="search"><span></span><i class="bi bi-search"></i></div>
                  <a class="btn-pill" href="/class-item">
                    <i class="bi bi-file-earmark-plus"></i><span>New Sheet</span>
                  </a>
                </div>

                <div class="tbl cl-tab">
                  <div class="th cl-h">
                    <div>Date</div>
                    <div>Subject Code</div>
                    <div>Descriptive Title</div>
                  </div>

                  <div class="cl-rows">
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                    <div class="tr cl-rw"><div></div><div></div><div></div></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
