<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <div class="view">
      <div class="cap">Class Item</div>

      <div class="wrap">
        <div class="frame">
          <div class="body ci-body">
            <div class="page ci">
              <div class="ci-head">
                <a class="ci-back" href="/class-list" aria-label="Back to Class List">‹</a>
                <div class="ci-ttl">April 14, 2026 : Tuesday &nbsp; || &nbsp; 9:49 AM &nbsp; || &nbsp; ICT-110</div>
              </div>

              <div class="tbl ci-tab">
                <div class="th ci-h">
                  <div>Time</div>
                  <div>Student ID</div>
                  <div>Student Name</div>
                  <div>Status</div>
                </div>

                <div class="ci-rows">
                  <div class="tr ci-rw"><div></div><div></div><div></div><div></div></div>
                  <div class="tr ci-rw"><div></div><div></div><div></div><div></div></div>
                  <div class="tr ci-rw"><div></div><div></div><div></div><div></div></div>
                  <div class="tr ci-rw"><div></div><div></div><div></div><div></div></div>
                  <div class="tr ci-rw"><div></div><div></div><div></div><div></div></div>
                </div>
              </div>

              <div class="ci-foot">
                <button class="btn-pill">
                  <i class="bi bi-download"></i><span>Export Sheet</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
