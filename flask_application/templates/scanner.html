<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="site-shell">
    <div class="viewport-16x9">
      <div class="app-caption">Scanner</div>

      <div class="content-area">
        <div class="page-frame">
          <div class="topbar">
            <a class="topbar-link" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i>
              <span>Dashboard</span>
            </a>
            <a class="topbar-link active" href="/scanner" data-screen-link>
              <i class="bi bi-camera"></i>
              <span>Scanner</span>
            </a>
            <a class="topbar-link" href="/attendance-log" data-screen-link>
              <i class="bi bi-journal-check"></i>
              <span>Attendance Log</span>
            </a>
            <a class="topbar-link" href="/class-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i>
              <span>Class List</span>
            </a>
          </div>

          <div class="page-body">
            <div class="page-panel camera-page">
              <div class="camera-left">
                <div class="camera-feed-wrap">
                  <div class="camera-feed">
                    <img src="{{ url_for('video_feed') }}" alt="Camera Feed">
                  </div>
                </div>

                <div class="camera-timebar" id="camera-datetime-bar">
                  APRIL 14, 2026 : TUESDAY &nbsp; || &nbsp; 9:49 AM
                </div>
              </div>

              <div class="camera-right">
                <div class="section-title-dark">STUDENT INFORMATION</div>

                <div class="info-card-dark">
                  <div class="info-group">
                    <div class="info-heading">STUDENT NAME</div>
                    <div class="info-text" id="student-name">Waiting for scan...</div>
                  </div>

                  <div class="info-group">
                    <div class="info-heading">STUDENT ID</div>
                    <div class="info-text" id="student-id">Waiting for scan...</div>
                  </div>
                </div>

                <div class="status-card-light">
                  <div class="info-heading">SCAN STATUS</div>
                  <div class="info-text" id="scan-status">No valid ID detected.</div>
                </div>
                
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
