<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <div class="view">
      <div class="cap">Scanner</div>

      <div class="wrap">
        <div class="frame">
          <div class="nav">
            <a class="nav-a" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i><span>Dashboard</span>
            </a>
            <a class="nav-a active" href="/scanner" data-screen-link>
              <i class="bi bi-camera"></i><span>Scanner</span>
            </a>
            <a class="nav-a" href="/attendance-log" data-screen-link>
              <i class="bi bi-journal-check"></i><span>Attendance Log</span>
            </a>
            <a class="nav-a" href="/class-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i><span>Class List</span>
            </a>
          </div>

          <div class="body">
            <div class="page sc">
              <div class="sc-l">
                <div class="sc-feed-wrap">
                  <div class="sc-feed">
                    <img src="{{ url_for('video_feed') }}" alt="Camera Feed">
                  </div>
                </div>
                <div class="sc-foot" id="camera-datetime-bar">APRIL 14, 2026 : TUESDAY &nbsp; || &nbsp; 9:49 AM</div>
              </div>

              <div class="sc-r">
                <div class="ttl-dark">Student Information</div>

                <div class="info-dark">
                  <div style="margin-bottom:1.2vw;">
                    <div class="ih">Student Name</div>
                    <div class="it" id="student-name">Waiting for scan...</div>
                  </div>
                  <div>
                    <div class="ih">Student ID</div>
                    <div class="it" id="student-id">Waiting for scan...</div>
                  </div>
                </div>

                <div class="info-lite">
                  <div class="ih">Scan Status</div>
                  <div class="it" id="scan-status">No valid ID detected.</div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
