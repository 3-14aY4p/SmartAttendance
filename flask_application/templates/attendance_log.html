<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="shell">
    <div class="view">
      <div class="cap">Attendance Log</div>

      <div class="wrap">
        <div class="frame">
          <div class="nav">
            <a class="nav-a" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i><span>Dashboard</span>
            </a>
            <a class="nav-a" href="/scanner" data-screen-link>
              <i class="bi bi-camera"></i><span>Scanner</span>
            </a>
            <a class="nav-a active" href="/attendance-log" data-screen-link>
              <i class="bi bi-journal-check"></i><span>Attendance Log</span>
            </a>
            <a class="nav-a" href="/class-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i><span>Class List</span>
            </a>
          </div>

          <div class="body">
            <div class="page al">
              <div class="al-in">
                <div class="tbl al-tab">
                  <div class="th al-h">
                    <div>Date &amp; Time</div>
                    <div>Student ID</div>
                    <div>Student Name</div>
                    <div>Status</div>
                  </div>

                  <div class="al-rows">
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                    <div class="tr al-rw"><div></div><div></div><div></div><div></div></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
