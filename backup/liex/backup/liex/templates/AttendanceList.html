<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title shown in browser tab -->
  <title>Smart Attendance System</title>

  <!-- Bootstrap for layout and components -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>

  <!-- Full screen container -->
  <div class="site-shell">
    <div class="viewport-16x9">

      <!-- Top navigation bar -->
      <div class="topbar">
        <!-- Each link navigates to a different page -->
        <a class="topbar-link" href="/" data-screen-link>
          <i class="bi bi-graph-up-arrow"></i>
          <span>Dashboard</span>
        </a>

        <a class="topbar-link" href="/camera" data-screen-link>
          <i class="bi bi-camera"></i>
          <span>Camera</span>
        </a>

        <a class="topbar-link" href="/view-attendance" data-screen-link>
          <i class="bi bi-eye-fill"></i>
          <span>View Attendance</span>
        </a>

        <!-- Active page (highlighted) -->
        <a class="topbar-link active" href="/attendance-list" data-screen-link>
          <i class="bi bi-file-earmark-text"></i>
          <span>Attendance List</span>
        </a>
      </div>

      <!-- Main content area -->
      <div class="content-area">
        <div class="page-frame">

          <!-- Header section of the attendance list -->
          <div class="list-header">

            <!-- Title of the page -->
            <div class="list-title">Official Attendance List</div>

            <!-- Dropdown placeholder (not functional yet) -->
            <div class="input-pill wide">
              School Year
              <i class="bi bi-caret-down-fill"></i>
            </div>
          </div>

          <!-- Table container -->
          <div class="list-table-wrap">

            <!-- Table header row (column labels) -->
            <div class="table-head-row attendance-grid-head">
              <div class="cell-pad">#</div> <!-- Row number -->
              <div class="cell-pad">Student ID</div>
              <div class="cell-pad">Student Name</div>
              <div class="cell-pad">Status</div>
            </div>

            <!-- Table body (data rows go here) -->
            <div class="table-body-area empty-body">

              <!-- Placeholder comment:
                   When connected to backend, rows should be dynamically inserted here.
                   Each row must follow the same structure:
                   number | student ID | student name | status
              -->

              <!-- Empty rows for layout spacing -->
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>
              <div class="row-grid attendance-grid-row"><div></div><div></div><div></div><div></div></div>

            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- JS file handles navigation animation and (if added) dynamic updates -->
  <script src="{{ url_for('static', filename='App.js') }}"></script>
</body>
</html>
