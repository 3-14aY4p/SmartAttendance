<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title -->
  <title>Smart Attendance System</title>

  <!-- Bootstrap for layout and ready-made UI styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
  <!-- Full-page wrapper -->
  <div class="site-shell">
    <div class="viewport-16x9">

      <!-- Top navigation bar -->
      <div class="topbar">
        <a class="topbar-link" href="/" data-screen-link>
          <i class="bi bi-graph-up-arrow"></i>
          <span>Dashboard</span>
        </a>

        <a class="topbar-link" href="/camera" data-screen-link>
          <i class="bi bi-camera"></i>
          <span>Camera</span>
        </a>

        <!-- Active page -->
        <a class="topbar-link active" href="/view-attendance" data-screen-link>
          <i class="bi bi-eye-fill"></i>
          <span>View Attendance</span>
        </a>

        <a class="topbar-link" href="/attendance-list" data-screen-link>
          <i class="bi bi-file-earmark-text"></i>
          <span>Attendance List</span>
        </a>
      </div>

      <!-- Main content area -->
      <div class="content-area">
        <div class="page-frame">

          <!-- Top toolbar for filters and actions -->
          <div class="view-toolbar">

            <!-- Left side filters -->
            <div class="toolbar-left">
              <!-- Class selector placeholder -->
              <div class="input-pill wide">
                Class: ICT 110
                <i class="bi bi-caret-down-fill"></i>
              </div>

              <!-- Date picker placeholder -->
              <div class="input-pill wide">
                <i class="bi bi-calendar-event"></i>
                Date (Calendar)
              </div>
            </div>

            <!-- Right side actions -->
            <div class="toolbar-right">
              <!-- Export button placeholder -->
              <div class="action-pill">Export Options</div>

              <!-- Sort button placeholder -->
              <div class="action-pill">
                <i class="bi bi-arrow-down-up"></i>
                Sort
              </div>
            </div>
          </div>

          <!-- Search bar placeholder -->
          <div class="search-row">
            <div class="search-pill">
              <i class="bi bi-search"></i>
              Search
            </div>
          </div>

          <!-- Table wrapper -->
          <div class="view-table-wrap">

            <!-- Table header -->
            <div class="table-head-row view-grid-head">
              <div class="cell-pad">Student ID</div>
              <div class="cell-pad">Student Name</div>
              <div class="cell-pad">Course, Year, &amp; Section</div>
            </div>

            <!-- Table body -->
            <div class="table-body-area">

              <!-- Empty placeholder rows for layout -->
              <!-- These can later be replaced by real backend data -->
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
              <div class="row-grid view-grid-row"><div></div><div></div><div></div></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- JS file for topbar animation and future page behavior -->
  <script src="{{ url_for('static', filename='App.js') }}"></script>
</body>
</html>
