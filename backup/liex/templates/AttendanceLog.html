<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
  <div class="site-shell">
    <div class="viewport-16x9">
      <div class="app-caption">Attendance Log</div>

      <div class="content-area">
        <div class="page-frame">
          <div class="topbar">
            <a class="topbar-link" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i>
              <span>Dashboard</span>
            </a>
            <a class="topbar-link" href="/camera" data-screen-link>
              <i class="bi bi-camera"></i>
              <span>Scanner</span>
            </a>
            <a class="topbar-link active" href="/view-attendance" data-screen-link>
              <i class="bi bi-journal-check"></i>
              <span>Attendance Log</span>
            </a>
            <a class="topbar-link" href="/attendance-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i>
              <span>Class List</span>
            </a>
          </div>

          <div class="page-body">
            <div class="page-panel log-page">
              <div class="log-shell">
                <div class="table-shell log-table">
                  <div class="table-head log-head">
                    <div>Date &amp; Time</div>
                    <div>Student ID</div>
                    <div>Student Name</div>
                    <div>Status</div>
                  </div>

                  <div class="log-rows">
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                    <div class="table-row log-row"><div></div><div></div><div></div><div></div></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='App.js') }}"></script>
</body>
</html>
