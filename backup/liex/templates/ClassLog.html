<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
  <div class="site-shell">
    <div class="viewport-16x9">
      <div class="app-caption">Class List</div>

      <div class="content-area">
        <div class="page-frame">
          <div class="topbar">
            <a class="topbar-link" href="/" data-screen-link>
              <i class="bi bi-bar-chart-line-fill"></i>
              <span>Dashboard</span>
            </a>
            <a class="topbar-link" href="/camera" data-screen-link>
              <i class="bi bi-camera"></i>
              <span>Scanner</span>
            </a>
            <a class="topbar-link" href="/view-attendance" data-screen-link>
              <i class="bi bi-journal-check"></i>
              <span>Attendance Log</span>
            </a>
            <a class="topbar-link active" href="/attendance-list" data-screen-link>
              <i class="bi bi-layout-text-sidebar-reverse"></i>
              <span>Class List</span>
            </a>
          </div>

          <div class="page-body">
            <div class="page-panel classlog-page">
              <div class="classlog-shell">
                <div class="classlog-tools">
                  <div class="search-bar">
                    <span></span>
                    <i class="bi bi-search"></i>
                  </div>

                  <a class="pill-btn pill-link" href="/class-item">
                    <i class="bi bi-file-earmark-plus"></i>
                    <span>New Sheet</span>
                  </a>
                </div>

                <div class="table-shell classlog-table">
                  <div class="table-head classlog-head">
                    <div>Date</div>
                    <div>Subject Code</div>
                    <div>Descriptive Title</div>
                  </div>

                  <div class="classlog-rows">
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                    <div class="table-row classlog-row"><div></div><div></div><div></div></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='App.js') }}"></script>
</body>
</html>
