<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
  <div class="site-shell">
    <div class="viewport-16x9">
      <div class="topbar">
        <a class="topbar-link" href="/" data-screen-link>
          <i class="bi bi-graph-up-arrow"></i>
          <span>Dashboard</span>
        </a>
        <a class="topbar-link active" href="/camera" data-screen-link>
          <i class="bi bi-camera"></i>
          <span>Camera</span>
        </a>
        <a class="topbar-link" href="/view-attendance" data-screen-link>
          <i class="bi bi-eye-fill"></i>
          <span>View Attendance</span>
        </a>
        <a class="topbar-link" href="/attendance-list" data-screen-link>
          <i class="bi bi-file-earmark-text"></i>
          <span>Attendance List</span>
        </a>
      </div>

      <div class="content-area">
        <div class="page-frame">
          <div class="camera-wrap">
            <div class="camera-left">
              <div class="preview-box">
                <!--displays live camera-->
                <img src="{{ url_for('video_feed') }}" alt="Camera Preview" class="live-camera-feed" id="live-camera-feed">
              </div>

              <div class="camera-meta">
                <div class="meta-item">
                  <!--targets for JS updates-->
                  <div class="meta-title">Student ID</div>
                  <div class="meta-value" id="student-id">Waiting for scan...</div>
                </div>
                <div class="meta-item">
                  <div class="meta-title">Student Name</div>
                  <div class="meta-value" id="student-name">Waiting for scan...</div>
                </div>
                <div class="meta-item">
                  <div class="meta-title">Status</div>
                  <div class="meta-value status-value" id="scan-status">Waiting for scan...</div>
                </div>
              </div>
            </div>

            <div class="camera-right">
              <div class="camera-right-title">ID PREVIEW</div>

              <div class="id-preview-card">
                <div class="id-preview-placeholder" id="id-preview-placeholder">
                  <i class="bi bi-person-vcard"></i>
                  <span>No scan yet</span>
                </div>
                
                <!--secondary display panel-->
                <div class="id-preview-details">
                  <div class="preview-detail-row">
                    <span class="preview-label">Student ID</span>
                    <span class="preview-detail-value" id="preview-student-id">---</span>
                  </div>
                  <div class="preview-detail-row">
                    <span class="preview-label">Student Name</span>
                    <span class="preview-detail-value" id="preview-student-name">---</span>
                  </div>
                  <div class="preview-detail-row">
                    <span class="preview-label">Status</span>
                    <span class="preview-detail-value" id="preview-status">---</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='App.js') }}"></script>
</body>
</html>
